apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm-server
    app.kubernetes.io/part-of: ai-infra-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-server
        app.kubernetes.io/part-of: ai-infra-lab
    spec:
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - /models/Qwen2.5-1.5B-Instruct
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --api-key
            - $(VLLM_API_KEY)
            - --gpu-memory-utilization
            - "0.65"
            - --max-model-len
            - "2048"
            - --enable-prefix-caching
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-secret
                  key: VLLM_API_KEY
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
              httpHeaders:
                - name: Authorization
                  value: Bearer token-abc123
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          volumeMounts:
            - name: model-cache
              mountPath: /models
              readOnly: true
      volumes:
        - name: model-cache
          hostPath:
            path: /models
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm-server
spec:
  selector:
    app.kubernetes.io/name: vllm-server
  ports:
    - name: http
      port: 8000
      targetPort: http
