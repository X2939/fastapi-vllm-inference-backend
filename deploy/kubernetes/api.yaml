apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-api
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm-api
    app.kubernetes.io/part-of: ai-infra-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-api
        app.kubernetes.io/part-of: ai-infra-lab
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9000"
    spec:
      containers:
        - name: api
          image: vllm-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vllm-config
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-secret
                  key: VLLM_API_KEY
          ports:
            - name: http
              containerPort: 9000
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-api
  namespace: vllm
  labels:
    app.kubernetes.io/name: vllm-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm-api
  ports:
    - name: http
      port: 9000
      targetPort: http
